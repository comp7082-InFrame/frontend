name: Frontend CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm run test -- --coverage

    - name: Build Next.js app
      run: npm run build

  deploy:
    needs: build-test
    runs-on: ubuntu-latest

    steps:
    - name: Deploy step
      run: echo "Deploy frontend here"